<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Atomy — Каталог</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>

:root {
  --blue:#4BBDE0; --blue2:#2FA8D0; --blue-light:#EBF7FC;
  --white:#fff; --bg:#F4FAFD; --text:#1A1A1A; --text2:#555;
  --muted:#9BB; --border:#CBE9F5; --green:#27AE60; --red:#E74C3C;
  --shadow:0 3px 18px rgba(75,189,224,0.14); --r:14px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Noto Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
a{text-decoration:none;color:inherit;}
button{font-family:inherit;cursor:pointer;border:none;outline:none;}

/* HEADER */
header{
  background:var(--blue);height:56px;padding:0 16px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:300;
  box-shadow:0 2px 12px rgba(75,189,224,0.35);
}
.logo{font-size:22px;font-weight:700;color:#fff;letter-spacing:2px;}
.logo span{font-size:15px;font-weight:300;opacity:.8;}
.header-reg{
  background:rgba(255,255,255,0.22);color:#fff;
  border:1.5px solid rgba(255,255,255,0.5);border-radius:20px;
  padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer;
}

/* PAGES */
.page{display:none;} .page.active{display:block;}

/* HERO */
.hero{
  background:linear-gradient(160deg,var(--blue) 0%,#1a90b8 100%);
  padding:28px 20px 24px;text-align:center;position:relative;overflow:hidden;
}
.hero::before,.hero::after{content:'';position:absolute;border-radius:50%;background:rgba(255,255,255,0.07);}
.hero::before{width:220px;height:220px;top:-80px;right:-60px;}
.hero::after{width:160px;height:160px;bottom:-70px;left:-40px;}
.hero h1{font-size:22px;font-weight:700;color:#fff;position:relative;z-index:1;margin-bottom:6px;}
.hero p{font-size:13px;color:rgba(255,255,255,.82);font-weight:300;position:relative;z-index:1;line-height:1.5;}

.main-wrap{padding:18px 16px 80px;}
.section-label{
  font-size:10px;letter-spacing:2.5px;text-transform:uppercase;
  color:var(--blue2);font-weight:700;margin-bottom:14px;
  display:flex;align-items:center;gap:8px;
}
.section-label::after{content:'';flex:1;height:1px;background:var(--border);}

/* CATEGORY GRID */
.cat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:13px;margin-bottom:24px;}
@media(min-width:600px){.cat-grid{grid-template-columns:repeat(3,1fr);}}
@media(min-width:900px){.cat-grid{grid-template-columns:repeat(4,1fr);}}
.cat-card{
  background:#fff;border-radius:var(--r);border:2px solid var(--border);
  padding:18px 10px 14px;display:flex;flex-direction:column;align-items:center;
  cursor:pointer;transition:all .2s;box-shadow:var(--shadow);
}
.cat-card:hover{border-color:var(--blue);transform:translateY(-3px);}
.cat-card:active{transform:scale(.97);}

/* Instagram-style circle */
.cat-circle{
  width:80px;height:80px;border-radius:50%;
  border:3px solid var(--blue);
  box-shadow:0 0 0 2px #fff, 0 0 0 5px var(--blue);
  overflow:hidden;margin-bottom:10px;
  background:#fff;
  display:flex;align-items:center;justify-content:center;
}
.cat-circle img{width:100%;height:100%;object-fit:cover;}
.cat-name{
  font-size:11px;font-weight:700;text-align:center;color:var(--text);
  letter-spacing:.8px;text-transform:uppercase;line-height:1.4;
}
.cat-count{font-size:10px;color:var(--muted);margin-top:3px;}

/* REG BANNER */
.reg-banner{
  background:linear-gradient(135deg,#4BBDE0,#2FA8D0);
  border-radius:var(--r);padding:18px 20px;margin-bottom:20px;
  display:flex;align-items:center;justify-content:space-between;
  box-shadow:0 4px 20px rgba(75,189,224,0.35);cursor:pointer;
}
.reg-banner-text{color:#fff;}
.reg-banner-text h3{font-size:15px;font-weight:700;margin-bottom:4px;}
.reg-banner-text p{font-size:12px;opacity:.85;line-height:1.4;}
.reg-banner-arrow{color:#fff;font-size:24px;opacity:.8;}

/* CATEGORY PAGE */
.cat-page-header{
  background:linear-gradient(160deg,var(--blue) 0%,#1a90b8 100%);
  padding:16px 16px 18px;position:sticky;top:56px;z-index:200;
}
.back-btn{
  display:flex;align-items:center;gap:8px;color:#fff;font-size:14px;
  font-weight:600;cursor:pointer;margin-bottom:10px;opacity:.9;background:none;
}
.cat-page-title{font-size:20px;font-weight:700;color:#fff;}
.cat-page-sub{font-size:12px;color:rgba(255,255,255,.75);margin-top:3px;}

/* PRODUCTS LIST */
.products-wrap{
  padding:14px 14px 80px;
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:16px;
  align-items:start;
}
@media(max-width:1100px){
  .products-wrap{grid-template-columns:repeat(3,minmax(0,1fr));}
}
@media(max-width:820px){
  .products-wrap{grid-template-columns:repeat(2,minmax(0,1fr));}
}
@media(max-width:560px){
  .products-wrap{grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;}
  .gallery{height:120px;}
  .product-info{padding:10px 10px 2px;}
  .product-name{font-size:12px;line-height:1.3;margin-bottom:6px;}
  .price-row-label{font-size:10px;}
  .price-row-value{font-size:11px;}
  .price-row-value.green{font-size:13px;}
  .stock-label{font-size:9px;padding:4px 8px;margin-bottom:5px;}
  .product-desc{font-size:10px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
  .product-btns{padding:8px 10px 10px;gap:6px;}
  .btn{height:38px;font-size:10px;border-radius:10px;}
  .btn-buy{height:30px;font-size:9px;}
}

/* PRODUCT CARD */
.product-card{
  background:#fff;border-radius:var(--r);border:1.5px solid var(--border);
  box-shadow:var(--shadow);margin-bottom:16px;overflow:hidden;
}
@media(min-width:700px){.product-card{margin-bottom:0;}}

/* Gallery */
.gallery{position:relative;overflow:hidden;background:#f8f9fa;height:240px;}
.gallery .placeholder-card{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
.gallery-track{display:flex;transition:transform .3s ease;height:100%;}
.gallery-slide{flex:0 0 100%;height:100%;display:flex;align-items:center;justify-content:center;background:#f8f9fa;}
.gallery-slide img{max-width:100%;max-height:100%;object-fit:contain;padding:10px;}
.gallery-slide .no-img{font-size:64px;opacity:.25;color:#888;font-weight:700;font-family:sans-serif;}
.gallery-dots{
  position:absolute;bottom:10px;left:50%;transform:translateX(-50%);
  display:flex;gap:6px;
}
.gallery-dot{width:7px;height:7px;border-radius:50%;background:rgba(0,0,0,0.2);cursor:pointer;transition:.2s;}
.gallery-dot.active{background:var(--blue);width:18px;border-radius:4px;}
.gallery-btn{
  position:absolute;top:50%;transform:translateY(-50%);
  background:rgba(255,255,255,0.85);border:none;border-radius:50%;
  width:34px;height:34px;font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}
.gallery-btn.prev{left:10px;}
.gallery-btn.next{right:10px;}
.gallery-btn:active{transform:translateY(-50%) scale(.92);}

/* Product info */
.product-info{padding:14px 14px 4px;}
.product-badge{
  display:inline-flex;align-items:center;gap:4px;
  font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;
  padding:3px 9px;border-radius:20px;margin-bottom:8px;
}
.badge-new{background:#E8F8EF;color:#27AE60;}
.badge-hit{background:#FFF3E0;color:#E67E22;}
.badge-hemohim{background:#EEF3FF;color:#5C6BC0;}
.product-name{font-size:16px;font-weight:700;color:var(--text);line-height:1.35;margin-bottom:10px;}
.price-row{display:flex;flex-direction:column;gap:0;margin-bottom:10px;}
.price-row-item{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);}
.price-row-item:last-child{border-bottom:none;}
.price-row-label{font-size:12px;color:var(--text2);}
.price-row-value{font-size:14px;font-weight:500;color:var(--text);}
.price-row-value.green{color:var(--green);font-size:18px;font-weight:800;}
.pv-tag{font-size:11px;background:var(--blue-light);color:var(--blue2);padding:2px 8px;border-radius:10px;font-weight:600;}
.product-desc{font-size:13px;color:var(--text2);line-height:1.6;margin:10px 0 4px;}
.product-tags{display:flex;flex-wrap:wrap;gap:5px;margin:8px 0;}
.tag{font-size:10px;background:#f0f0f0;color:var(--text2);padding:3px 9px;border-radius:10px;}
.stock-label{
  display:flex;align-items:center;gap:5px;
  font-size:11px;font-weight:600;padding:5px 12px;border-radius:6px;margin-bottom:6px;
}
.in-stock{background:#e8f8ef;color:var(--green);}
.on-order{background:#fff3e0;color:#e67e22;}

/* Buttons */
.product-btns{padding:12px 14px 14px;display:flex;flex-direction:column;gap:10px;}
.btn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  width:100%;height:54px;border-radius:12px;
  font-size:14px;font-weight:700;cursor:pointer;transition:all .18s;
  border:none;letter-spacing:.3px;text-decoration:none;
}
.btn:active{transform:scale(.97);}
.btn-primary{background:#fff;color:var(--blue);border:2.5px solid var(--blue);font-weight:800;}
.btn-primary:hover{background:var(--blue-light);}
.btn-buy{background:#fff;color:var(--blue2);border:1.5px solid var(--border);font-size:12px;font-weight:400;height:40px;}
.btn-buy:hover{background:var(--blue-light);}
.btn-question{background:#fff;color:var(--blue);border:2.5px solid var(--blue);}
.btn-question:hover{background:var(--blue-light);}
.btn-disabled{opacity:.45;cursor:not-allowed;pointer-events:none;}



/* BOTTOM NAV */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;background:#fff;
  border-top:1px solid var(--border);display:flex;
  z-index:400;box-shadow:0 -2px 12px rgba(0,0,0,0.07);
  padding-bottom:env(safe-area-inset-bottom);
}
.nav-item{
  flex:1;padding:10px 0 8px;display:flex;flex-direction:column;
  align-items:center;gap:3px;cursor:pointer;transition:.15s;
  font-size:10px;font-weight:600;color:var(--muted);letter-spacing:.5px;
}
.nav-item.active{color:var(--blue);}
.nav-item svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2;}
.nav-item.active svg{stroke:var(--blue);}

/* TOAST */
.toast{
  position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-10px);
  background:#1A1A1A;color:#fff;padding:10px 20px;border-radius:20px;
  font-size:13px;font-weight:600;z-index:999;opacity:0;transition:.3s;pointer-events:none;
  white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}


/* Manage list items */
.mgr-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);}
.mgr-item:last-child{border-bottom:none;}
.mgr-item-thumb{width:44px;height:44px;border-radius:8px;object-fit:cover;background:var(--blue-light);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:20px;}
.mgr-item-thumb img{width:44px;height:44px;border-radius:8px;object-fit:cover;}
.mgr-item-info{flex:1;min-width:0;}
.mgr-item-name{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mgr-item-price{font-size:11px;color:var(--muted);margin-top:2px;}
.mgr-item-status{font-size:10px;padding:2px 7px;border-radius:8px;font-weight:600;}
.mgr-status-on{background:#e8f8ef;color:#27AE60;}
.mgr-status-off{background:#fff3e0;color:#e67e22;}
.mgr-edit-btn{background:var(--blue-light);color:var(--blue2);border:none;border-radius:8px;padding:7px 12px;font-size:12px;font-weight:600;cursor:pointer;flex-shrink:0;touch-action:manipulation;}

.mgr-add-btn{width:100%;height:48px;margin-top:12px;background:var(--blue);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;touch-action:manipulation;}


/* Photos preview */
.photos-preview{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;}
.photo-thumb-wrap{position:relative;width:64px;height:64px;}
.photo-thumb-wrap img{width:64px;height:64px;border-radius:8px;object-fit:cover;}
.photo-del{position:absolute;top:-6px;right:-6px;width:20px;height:20px;background:#e74c3c;color:#fff;border-radius:50%;border:none;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;touch-action:manipulation;}
.photo-add-label{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border:1.5px dashed var(--blue);border-radius:10px;font-size:13px;color:var(--blue2);font-weight:600;cursor:pointer;background:var(--blue-light);touch-action:manipulation;}
.mgr-download-btn{
  width:100%;height:50px;background:#fff;color:var(--blue2);
  border:none;border-radius:12px;font-size:15px;font-weight:700;
  cursor:pointer;touch-action:manipulation;
}
.mgr-export-btn{
  width:100%;height:48px;background:var(--blue);color:#fff;
  border:none;border-radius:12px;font-size:14px;font-weight:700;
  cursor:pointer;touch-action:manipulation;
}
.mgr-import-label{
  display:flex;align-items:center;justify-content:center;
  width:100%;height:48px;border-radius:12px;
  border:2px dashed var(--border);background:#fafbfc;
  font-size:14px;font-weight:600;color:var(--text2);
  cursor:pointer;touch-action:manipulation;gap:6px;
}
.mgr-import-label:hover{background:var(--blue-light);border-color:var(--blue);}

/* ===== SEARCH + SORT (minimal additions) ===== */
.catalog-tools{
  padding:10px 14px 0;
}
.catalog-tools-inner{
  display:flex;gap:10px;flex-wrap:wrap;align-items:center;
}
.catalog-search-wrap{position:relative;flex:1 1 230px;min-width:220px;}
.catalog-search-input,.catalog-sort-select{
  width:100%;height:42px;padding:0 12px;border-radius:12px;
  border:1.5px solid var(--border);background:#fff;font-size:13px;
  color:var(--text);font-family:inherit;box-shadow:var(--shadow);
}
.catalog-search-input:focus,.catalog-sort-select:focus{
  outline:none;border-color:var(--blue);
}
.catalog-sort-wrap{flex:0 0 190px;max-width:190px;}
.catalog-tools-note{
  width:100%;font-size:11px;color:var(--muted);padding:2px 2px 0;
}
.catalog-search-suggest{
  position:absolute;left:0;right:0;top:calc(100% + 6px);
  background:#fff;border:1.5px solid var(--border);border-radius:12px;
  box-shadow:0 10px 28px rgba(0,0,0,.10);overflow:hidden;z-index:600;display:none;
}
.catalog-search-suggest.open{display:block;}
.catalog-suggest-item{
  padding:10px 12px;border-bottom:1px solid #EEF5F8;cursor:pointer;
}
.catalog-suggest-item:last-child{border-bottom:none;}
.catalog-suggest-item:hover{background:var(--blue-light);}
.catalog-suggest-name{font-size:13px;font-weight:700;color:var(--text);line-height:1.35;}
.catalog-suggest-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.catalog-search-hit{background:#FFF3B0;border-radius:3px;padding:0 2px;}
@media(max-width:560px){
  .catalog-sort-wrap{flex:1 1 100%;max-width:none;}
}


/* ===== HEADER-INTEGRATED SEARCH ===== */
.hero{padding-bottom:18px;}
.hero-search{
  position:relative;
  max-width:340px;
  margin:14px 0 0 0;
  z-index:2;
}
.hero-search .catalog-search-input{
  height:40px;
  padding:0 14px 0 38px;
  border-radius:20px;
  border:1px solid rgba(255,255,255,.20);
  background:rgba(255,255,255,.18);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  color:#fff;
  box-shadow:none;
}
.hero-search .catalog-search-input::placeholder{
  color:rgba(255,255,255,.78);
}
.hero-search .catalog-search-input:focus{
  background:rgba(255,255,255,.24);
  border-color:rgba(255,255,255,.34);
}
.hero-search::before{
  content:'⌕';
  position:absolute;
  left:14px;
  top:50%;
  transform:translateY(-50%);
  color:rgba(255,255,255,.80);
  font-size:14px;
  line-height:1;
  pointer-events:none;
}
.hero-search .catalog-search-suggest{
  top:calc(100% + 8px);
  border:none;
  box-shadow:0 12px 28px rgba(0,0,0,.12);
}
.hero-search-note{
  margin-top:8px;
  font-size:11px;
  color:rgba(255,255,255,.78);
  text-align:left;
  padding-left:2px;
}
@media(max-width:560px){
  .hero-search{max-width:100%;}
}


/* ===== PREMIUM PLACEHOLDER FOR PRODUCTS WITHOUT PHOTO ===== */
.placeholder-card {
  position:relative;
  width:100%;
  height:100%;
  overflow:hidden;
  display:flex;
  align-items:flex-end;
  justify-content:flex-start;
  background:
    linear-gradient(180deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.34) 100%),
    linear-gradient(135deg, #f5f7fa 0%, #e8edf2 100%);
}
.placeholder-card::before {
  content:'';

/* ============================================================
   ТОВАРЫ (загружаются из data/index.json)
   ============================================================ */
let PRODUCTS = {};

async function loadProducts() {
  try {
    const res = await fetch('data/index.json');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    // Build PRODUCTS object by category
    PRODUCTS = {};
    for (const p of data.products) {
      if (!PRODUCTS[p.category]) PRODUCTS[p.category] = [];
      PRODUCTS[p.category].push(p);
    }
    return true;
  } catch(e) {
    console.error('Ошибка загрузки товаров:', e);
    return false;
  }
}

async function loadProductDetail(catId, productId) {
  // Try exact name first
  try {
    const res = await fetch('data/products/' + catId + '/' + productId + '.json');
    if (res.ok) return await res.json();
  } catch(e) {}
  // Try with any timestamp suffix (id_2026-04-09_19-17.json)
  // We can't list directory, so just return null — photoCount from index.json is enough
  return null;
}

   ============================================================ */
let currentCatId = null;
let historyStack = ['home'];

function showPage(pageId) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + pageId).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const ni = document.getElementById('nav-' + pageId);
  if (ni) ni.classList.add('active');
  window.scrollTo(0, 0);
}

function openCat(catId) {
  const cat = CATEGORIES.find(c => c.id === catId);
  if (!cat) return;
  currentCatId = catId;
  document.getElementById('catTitle').textContent = cat.name;
  document.getElementById('catSub').textContent = cat.sub;
  historyStack.push('cat');
  showPage('cat');
  if (history.pushState) history.pushState(null, '', '#' + catId);
  renderProducts(catId);
}

function goBack() {
  historyStack.pop();
  showPage('home');
  if (history.pushState) history.pushState(null, '', '#');
}

window.addEventListener('popstate', function() {
  const hash = location.hash.replace('#', '');
  if (hash && CATEGORIES.some(c => c.id === hash)) openCat(hash);
  else showPage('home');
});

/* ============================================================
   РЕНДЕР КАТЕГОРИЙ
   ============================================================ */
function renderCategories() {
  const grid = document.getElementById('catGrid');
  grid.innerHTML = CATEGORIES.map(cat => {
    const count = (PRODUCTS[cat.id] || []).length;
    const imgSrc = CAT_IMGS[cat.id];
    const imgHTML = imgSrc
      ? `<img src="${imgSrc}" alt="${cat.name}">`
      : `<span style="font-size:36px">&#128230;</span>`;
    return `<div class="cat-card" onclick="openCat('${cat.id}')">
      <div class="cat-circle">${imgHTML}</div>
      <div class="cat-name">${cat.name}</div>
      <div class="cat-count">${count} товаров</div>
    </div>`;
  }).join('');
  setupGlobalSearch();
}

/* ============================================================
   РЕНДЕР ТОВАРОВ (карточки из data/products/)
   ============================================================ */
async function renderProducts(catId) {
  const wrap = document.getElementById('productsWrap');
  const cfg = getConfig();
  wrap.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--muted);">Загрузка...</div>';

  const baseList = PRODUCTS[catId] || [];
  setupCategoryTools(catId);

  const helpBlock = `<div style="grid-column:1/-1;padding:8px 0 4px;text-align:center;">
    <div style="font-size:12px;color:#6e8792;line-height:1.5;">Есть вопрос по товару? <a href="${cfg.questionWa}" target="_blank" style="color:#4BBDE0;font-weight:700;">WhatsApp</a> · <a href="${cfg.questionTg}" target="_blank" style="color:#4BBDE0;font-weight:700;">Telegram</a> · BiP: 79690098639</div>
  </div>`;

  // Load full details for all products in category
  const details = await Promise.all(
    baseList.map(p => loadProductDetail(catId, p.id))
  );
  // Merge: use detail if loaded, else use index entry
  let products = baseList.map((p, i) => details[i] ? {...p, ...details[i]} : p);

  // Apply search filter
  const q = normText(catalogSearchState.catQuery || '');
  if (q.length >= 3) {
    products = products.filter(p => matchesWords(p.name, q));
    renderSuggest('catSearchSuggest', products.map(p => ({...p, _catId: catId})), q, false);
  } else {
    closeSuggest('catSearchSuggest');
  }

  products = sortByPriceAfter(products, catalogSearchState.catSort || 'default');

  const note = document.getElementById('catToolsNote');
  if (note) {
    if (q.length >= 3 && products.length) note.textContent = 'Найдено товаров: ' + products.length;
    else if (q.length >= 3 && !products.length) note.textContent = 'Ничего не найдено. Попробуй другое слово.';
    else note.textContent = '';
  }

  if (!products.length) {
    const emptyText = q.length >= 3 ? 'По вашему запросу ничего не найдено' : 'Товары скоро появятся';
    wrap.innerHTML = helpBlock + `<div style="grid-column:1/-1;text-align:center;padding:40px 20px;color:var(--muted);font-size:14px;">${emptyText}</div>`;
    return;
  }

  wrap.innerHTML = helpBlock + products.map(p => buildCard(p, catId)).join('');
  wrap.querySelectorAll('[data-gallery]').forEach(initGallery);
}

/* ============================================================
   ПОСТРОЕНИЕ КАРТОЧКИ
   ============================================================ */
function formatPrice(v) {
  return (v === null || v === undefined || v === '') ? 'Уточняйте' : Number(v).toLocaleString('ru') + ' руб.';
}

function badgeHTML(badge) {
  if (!badge) return '';
  const map = {hit:'Хит', new:'Новинка', hemohim:'ХемоХИМ'};
  const cls = {hit:'badge-hit', new:'badge-new', hemohim:'badge-hemohim'};
  return `<span class="product-badge ${cls[badge]||'badge-new'}">${map[badge]||badge}</span>`;
}

function buildCard(p, catId) {
  const cfg = getConfig();
  const nameTxt = p.name;
  const waMsg = encodeURIComponent('Здравствуйте, хочу купить ' + nameTxt);
  const qMsg  = encodeURIComponent('Здравствуйте, хочу спросить про товар ' + nameTxt);
  const waLink  = cfg.waLink + '?text=' + waMsg;
  const qWaLink = cfg.questionWa + '?text=' + qMsg;
  const qTgLink = cfg.questionTg + '?text=' + qMsg;

  // Photos: try to load up to 8 photos regardless of photoCount
  // If photoCount > 0 use it, otherwise probe up to 8
  const photoCount = p.photoCount || 0;
  const maxPhotos = photoCount > 0 ? Math.min(photoCount, 8) : 8;
  const basePath = `photos/${catId}/${p.id}`;

  let slides = '';
  // Try multiple extensions for each photo
  const exts = ['jpg', 'jpeg', 'png', 'webp'];
  for (let i = 1; i <= maxPhotos; i++) {
    // Primary: .jpg, with fallback onerror chain
    slides += `<div class="gallery-slide" id="slide-${p.id}-${i}">
      <img src="${basePath}/${i}.jpg" alt="${nameTxt}" loading="lazy"
        onerror="tryNextExt(this,'${basePath}/${i}',['jpeg','png','webp'],${i},'${p.id}')">
    </div>`;
  }

  // We don't know slideCount until photos actually load
  // Use photoCount if available, else assume max and hide empty slides
  const slideCount = maxPhotos;

  const dots = slideCount > 1
    ? `<div class="gallery-dots" id="dots-${p.id}">${Array.from({length:slideCount},(_,i)=>`<div class="gallery-dot${i===0?' active':''}" onclick="goSlide(this,${i})"></div>`).join('')}</div>`
    : '';
  const prevBtn = slideCount > 1 ? `<button class="gallery-btn prev" onclick="slideGallery(this,-1)">&#8249;</button>` : '';
  const nextBtn = slideCount > 1 ? `<button class="gallery-btn next" onclick="slideGallery(this,1)">&#8250;</button>` : '';

  const galleryHTML = `<div class="gallery" data-gallery data-slides="${slideCount}" data-cur="0" data-id="${p.id}" data-base="${basePath}">
      <div class="gallery-track">${slides}</div>
      ${prevBtn}${nextBtn}${dots}
      <div class="placeholder-card" id="ph-${p.id}" style="display:none;position:absolute;inset:0;">
        <div class="placeholder-content">
          <div class="placeholder-badge">Atomy</div>
          <div class="placeholder-title">Фото скоро будет добавлено</div>
          <div class="placeholder-sub">Атоми — абсолютное качество</div>
        </div>
      </div>
    </div>`;

  const stockHTML = ''; // Статус убран — только кнопка "Купить из наличия" если есть

  const buyBtn = ((p.city_stock || p.inStock) && p.buyHidden !== true)
    ? `<a class="btn btn-buy" href="${waLink}" target="_blank">📦 Купить из наличия в городе</a>`
    : '';

  const tags = p.tags && p.tags.length
    ? `<div class="product-tags">${p.tags.map(t=>`<span class="tag">#${t}</span>`).join('')}</div>`
    : '';

  return `<div class="product-card" data-id="${p.id}">
    ${galleryHTML}
    <div class="product-info">
      ${badgeHTML(p.badge)}
      <div class="product-name">${nameTxt}</div>
      <div style="font-size:11px;color:#444;margin-bottom:8px;"><span style="color:#4BBDE0;font-weight:700;">✔</span> Оригинальный продукт Atomy</div>
      ${stockHTML}
      <div class="price-row">
        <div class="price-row-item">
          <span class="price-row-label">Цена до регистрации</span>
          <span class="price-row-value">${formatPrice(p.priceBefore)}</span>
        </div>
        <div class="price-row-item">
          <span class="price-row-label">Цена после регистрации</span>
          <span class="price-row-value green">${formatPrice(p.priceAfter)}</span>
        </div>
      </div>
      <div class="product-desc">${p.desc || ''}</div>
      ${tags}
    </div>
    <div class="product-btns">
      <a class="btn btn-primary" href="${cfg.refLink}" target="_blank">Зарегистрироваться для выгодной цены</a>
      ${buyBtn}
      <div style="font-size:12px;color:#555;padding:4px 0;line-height:1.6;">
        💬 Спросить: <a href="${qWaLink}" target="_blank" style="color:#4BBDE0;font-weight:700;">WhatsApp</a> · <a href="${qTgLink}" target="_blank" style="color:#4BBDE0;font-weight:700;">Telegram</a>
        <div style="font-size:11px;color:#6e8792;margin-top:2px;">BiP: 79690098639</div>
      </div>
    </div>
  </div>`;
}

/* ============================================================
   ГАЛЕРЕЯ
   ============================================================ */
/* ============================================================
   PHOTO LOADING WITH FALLBACK
   ============================================================ */
function tryNextExt(img, basePath, extsLeft, idx, prodId) {
  if (extsLeft.length === 0) {
    // No more extensions — hide this slide
    const slide = img.closest('.gallery-slide');
    if (slide) {
      slide.style.display = 'none';
      slide.dataset.empty = '1';
    }
    // Check if all slides in this gallery are empty
    const gallery = img.closest('[data-gallery]');
    if (gallery) {
      checkGalleryEmpty(gallery, prodId);
    }
    return;
  }
  const nextExt = extsLeft[0];
  const remaining = extsLeft.slice(1);
  img.onerror = () => tryNextExt(img, basePath, remaining, idx, prodId);
  img.src = `${basePath}.${nextExt}`;
}

function checkGalleryEmpty(gallery, prodId) {
  const slides = gallery.querySelectorAll('.gallery-slide');
  const visibleSlides = [...slides].filter(s => s.style.display !== 'none' && !s.dataset.empty);
  
  if (visibleSlides.length === 0) {
    // All photos failed — show placeholder
    const ph = gallery.querySelector(`#ph-${prodId}`);
    if (ph) ph.style.display = 'flex';
    gallery.querySelector('.gallery-track').style.display = 'none';
    const prevBtn = gallery.querySelector('.gallery-btn.prev');
    const nextBtn = gallery.querySelector('.gallery-btn.next');
    const dots = gallery.querySelector('.gallery-dots');
    if (prevBtn) prevBtn.style.display = 'none';
    if (nextBtn) nextBtn.style.display = 'none';
    if (dots) dots.style.display = 'none';
  } else {
    // Update slide count to actual visible count
    gallery.dataset.slides = visibleSlides.length;
    // Update dots
    const dotsEl = gallery.querySelector('.gallery-dots');
    if (dotsEl && visibleSlides.length <= 1) dotsEl.style.display = 'none';
  }
}

function initGallery(el) {
  let startX = 0;
  const total = parseInt(el.dataset.slides) || 0;
  if (total <= 1) return;
  el.addEventListener('touchstart', e => { startX = e.touches[0].clientX; }, {passive:true});
  el.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - startX;
    if (Math.abs(dx) > 40) {
      const cur = parseInt(el.dataset.cur) || 0;
      const next = dx < 0 ? Math.min(cur+1, total-1) : Math.max(cur-1, 0);
      updateGallery(el, next);
    }
  });
}
function slideGallery(btn, dir) {
  const gallery = btn.closest('[data-gallery]');
  const total = parseInt(gallery.dataset.slides) || 0;
  const cur = parseInt(gallery.dataset.cur) || 0;
  updateGallery(gallery, Math.max(0, Math.min(total-1, cur+dir)));
}
function goSlide(dot, i) { updateGallery(dot.closest('[data-gallery]'), i); }
function updateGallery(gallery, i) {
  gallery.dataset.cur = i;
  gallery.querySelector('.gallery-track').style.transform = `translateX(-${i*100}%)`;
  gallery.querySelectorAll('.gallery-dot').forEach((d,idx) => d.classList.toggle('active', idx===i));
}

/* ============================================================
   TOAST
   ============================================================ */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

/* ============================================================
   ПОИСК И СОРТИРОВКА
   ============================================================ */
const catalogSearchState = { currentCatId: null, catQuery: '', catSort: 'default', globalQuery: '' };

function normText(v) { return String(v||'').toLowerCase().replace(/ё/g,'е').trim(); }
function matchesWords(name, query) {
  const q = normText(query);
  if (q.length < 3) return true;
  const words = q.split(/\s+/).filter(Boolean);
  const n = normText(name);
  return words.every(w => n.includes(w));
}
function escapeRegExp(s) { return String(s).replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }
function markText(name, query) {
  let out = String(name||'');
  const q = normText(query);
  if (q.length < 3) return out;
  const words = [...new Set(q.split(/\s+/).filter(Boolean))].sort((a,b)=>b.length-a.length);
  for (const w of words) {
    const re = new RegExp('(' + escapeRegExp(w) + ')', 'gi');
    out = out.replace(re, '<mark class="catalog-search-hit">$1</mark>');
  }
  return out;
}
function sortByPriceAfter(arr, mode) {
  if (mode === 'after-asc') return [...arr].sort((a,b) => (a.priceAfter||9e9)-(b.priceAfter||9e9));
  if (mode === 'after-desc') return [...arr].sort((a,b) => (b.priceAfter||0)-(a.priceAfter||0));
  return arr;
}
function allProductsFlat() {
  return CATEGORIES.flatMap(cat =>
    (PRODUCTS[cat.id]||[]).map(p => ({...p, _catId: cat.id, _catName: cat.name}))
  );
}
function closeSuggest(id) {
  const el = document.getElementById(id);
  if (el) { el.classList.remove('open'); el.innerHTML = ''; }
}
function openProductFromSuggest(catId, productId) {
  closeSuggest('globalSearchSuggest');
  closeSuggest('catSearchSuggest');
  if (catId !== currentCatId) {
    openCat(catId);
    setTimeout(() => scrollToProduct(productId), 200);
  } else {
    scrollToProduct(productId);
  }
}
function scrollToProduct(productId) {
  const el = document.querySelector('.product-card[data-id="'+productId+'"]');
  if (!el) return;
  el.scrollIntoView({behavior:'smooth', block:'start'});
  const oldBorder = el.style.borderColor;
  el.style.borderColor = 'var(--blue)';
  el.style.boxShadow = '0 0 0 3px rgba(75,189,224,.18), var(--shadow)';
  setTimeout(() => { el.style.borderColor = oldBorder; el.style.boxShadow = ''; }, 1500);
}
function renderSuggest(id, items, query, isGlobal) {
  const box = document.getElementById(id);
  if (!box) return;
  if (normText(query).length < 3 || !items.length) { box.classList.remove('open'); box.innerHTML = ''; return; }
  box.innerHTML = items.slice(0,8).map(item => `
    <div class="catalog-suggest-item" onclick="openProductFromSuggest('${item._catId||currentCatId}','${item.id}')">
      <div class="catalog-suggest-name">${markText(item.name, query)}</div>
      <div class="catalog-suggest-sub">${isGlobal ? item._catName+' · ' : ''}${formatPrice(item.priceAfter)}</div>
    </div>
  `).join('');
  box.classList.add('open');
}
function setupGlobalSearch() {
  const input = document.getElementById('globalSearchInput');
  if (!input || input.dataset.ready === '1') return;
  input.dataset.ready = '1';
  input.addEventListener('input', () => {
    catalogSearchState.globalQuery = input.value;
    const q = normText(input.value);
    if (q.length < 3) { closeSuggest('globalSearchSuggest'); return; }
    const items = allProductsFlat().filter(p => matchesWords(p.name, q));
    renderSuggest('globalSearchSuggest', items, q, true);
  });
  input.addEventListener('focus', () => {
    const q = normText(input.value);
    if (q.length >= 3) {
      const items = allProductsFlat().filter(p => matchesWords(p.name, q));
      renderSuggest('globalSearchSuggest', items, q, true);
    }
  });
}
function setupCategoryTools(catId) {
  catalogSearchState.currentCatId = catId;
  const searchInput = document.getElementById('catSearchInput');
  const sortSelect = document.getElementById('catSortSelect');
  if (searchInput) {
    searchInput.value = catalogSearchState.catQuery || '';
    if (searchInput.dataset.bound !== '1') {
      searchInput.dataset.bound = '1';
      searchInput.addEventListener('input', () => {
        catalogSearchState.catQuery = searchInput.value;
        renderProducts(currentCatId);
      });
    }
  }
  if (sortSelect) {
    sortSelect.value = catalogSearchState.catSort || 'default';
    if (sortSelect.dataset.bound !== '1') {
      sortSelect.dataset.bound = '1';
      sortSelect.addEventListener('change', () => {
        catalogSearchState.catSort = sortSelect.value;
        renderProducts(currentCatId);
      });
    }
  }
}
document.addEventListener('click', e => {
  if (!e.target.closest('.catalog-search-wrap')) {
    closeSuggest('globalSearchSuggest');
    closeSuggest('catSearchSuggest');
  }
});

/* ============================================================
   DEEP LINK через хэш
   ============================================================ */
function handleHash() {
  const hash = location.hash.replace('#','');
  if (hash && CATEGORIES.some(c => c.id === hash)) openCat(hash);
}
